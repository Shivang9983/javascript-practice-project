<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Image Gallery</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="logo-area">
          <i data-lucide="image" class="logo-icon"></i>
          <h1>ImagiFlow</h1>
        </div>
        <p class="subtitle">Generate & search beautiful, high-resolution photos instantly</p>
      </header>

      <!-- Glassmorphic control panel -->
      <div class="control-panel">
        <div class="input-group search-group">
          <label for="search-query"><i data-lucide="search"></i> Category / Topic</label>
          <input 
            type="text" 
            id="search-query" 
            placeholder="e.g. Nature, Space, Cyberpunk..." 
            value="nature"
          />
        </div>

        <div class="input-row">
          <div class="input-group count-group">
            <label for="input"><i data-lucide="layers"></i> Quantity</label>
            <input
              type="number"
              id="input"
              class="input"
              value="4"
              min="1"
              max="10"
            />
          </div>
          <button class="btn" id="btn">
            <span class="btn-text">Generate Photos</span>
            <i data-lucide="sparkles"></i>
          </button>
        </div>
        
        <!-- Preset categories for quick filtering -->
        <div class="categories-tags">
          <span class="tag active" data-tag="nature">Nature</span>
          <span class="tag" data-tag="space">Space</span>
          <span class="tag" data-tag="architecture">Architecture</span>
          <span class="tag" data-tag="animals">Animals</span>
          <span class="tag" data-tag="neon">Cyberpunk</span>
        </div>
        
        <small class="errorMessage" id="errorMessage">Error Message</small>
      </div>

      <!-- Gallery Grid -->
      <div class="gallery-wrapper">
        <div class="gallery" id="gallery">
          <!-- Placeholder skeletons or dynamic photos loaded here -->
        </div>
      </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
      <button class="lightbox-close" id="lightbox-close" aria-label="Close lightbox">
        <i data-lucide="x"></i>
      </button>
      <div class="lightbox-content">
        <div class="lightbox-image-wrapper">
          <img id="lightbox-img" src="" alt="Full size view">
        </div>
        <div class="lightbox-footer">
          <div class="lightbox-meta">
            <span id="lightbox-photographer-label">Photo by</span>
            <span id="lightbox-author" class="lightbox-author">Unsplash Creator</span>
          </div>
          <a id="lightbox-download" class="lightbox-download-btn" href="#" target="_blank" download>
            <i data-lucide="download"></i> Download HD
          </a>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
